<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Gestão de Crises Institucionais</mat-card-title>
      <mat-card-subtitle>Entre com suas credenciais</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="entrar()" class="login-form">
        <mat-form-field appearance="outline" class="login-field">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="username" />
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <mat-error>Informe um e-mail válido.</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="login-field">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="senha" autocomplete="current-password" />
          @if (form.controls.senha.invalid && form.controls.senha.touched) {
            <mat-error>Informe sua senha.</mat-error>
          }
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="login-button" [disabled]="carregando">
          @if (carregando) {
            <mat-progress-spinner diameter="20" mode="indeterminate"></mat-progress-spinner>
          } @else {
            Entrar
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
